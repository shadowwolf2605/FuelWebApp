<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>

    <!-- Arc gradient: cyan → blue → violet -->
    <linearGradient id="arcFill" x1="176" y1="459" x2="395" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="55%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Needle gradient -->
    <linearGradient id="needleGrad" x1="256" y1="320" x2="370" y2="254" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Center hub gradient -->
    <radialGradient id="hubGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>

    <!-- Soft background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="62%" r="42%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e3a8a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0a18" stop-opacity="0"/>
    </radialGradient>

    <!-- Arc glow filter -->
    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Needle glow filter -->
    <filter id="needleGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hub glow -->
    <filter id="hubGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────── -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="512" rx="114" fill="url(#bgGlow)"/>

  <!-- Faint outer ring -->
  <circle cx="256" cy="320" r="195" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- ── Speedometer track (full 300° arc, 7 o'clock → 5 o'clock clockwise) ── -->
  <!-- center (256,320) radius 155 · start 120° · end 60° · large-arc=1 · sweep=1 -->
  <!-- 120°: x=256+155·cos120=178.5  y=320+155·sin120=454.2  -->
  <!-- 60°:  x=256+155·cos60 =333.5  y=320+155·sin60 =454.2  -->
  <path d="M 178.5 454 A 155 155 0 1 1 333.5 454"
    fill="none" stroke="#1e2d4a" stroke-width="26" stroke-linecap="round"/>

  <!-- Tick marks at 0 / 20 / 40 / 60 / 80 / 100% of arc -->
  <!-- Angles: 120°, 180°, 240°, 300°, 0°, 60° -->
  <!-- radius inner=140, outer=168 -->
  <g stroke="#334155" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <!-- 0% 120° -->
    <line x1="186" y1="441" x2="171" y2="467"/>
    <!-- 20% 180° -->
    <line x1="116" y1="320" x2="88"  y2="320"/>
    <!-- 40% 240° -->
    <line x1="186" y1="199" x2="171" y2="173"/>
    <!-- 60% 300° -->
    <line x1="326" y1="199" x2="341" y2="173"/>
    <!-- 80% 0° -->
    <line x1="396" y1="320" x2="424" y2="320"/>
    <!-- 100% 60° -->
    <line x1="326" y1="441" x2="341" y2="467"/>
  </g>

  <!-- ── Colored arc glow (70% = 210° from 120° → 330°) ── -->
  <!-- 330°: x=256+155·cos330=256+134.2=390.2  y=320+155·sin330=320-77.5=242.5 -->
  <path d="M 178.5 454 A 155 155 0 1 1 390 243"
    fill="none" stroke="#3b82f6" stroke-width="40" stroke-linecap="round"
    opacity="0.25" filter="url(#arcGlow)"/>

  <!-- ── Colored arc (70% filled) ── -->
  <path d="M 178.5 454 A 155 155 0 1 1 390 243"
    fill="none" stroke="url(#arcFill)" stroke-width="26" stroke-linecap="round"
    filter="url(#arcGlow)"/>

  <!-- ── Needle tail (short, going opposite to 330° = 150°) ── -->
  <!-- 150°: direction from center. tail length = 28px -->
  <!-- x=256+28·cos150=256-24.2=231.8  y=320+28·sin150=320+14=334 -->
  <line x1="256" y1="320" x2="232" y2="334"
    stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

  <!-- ── Needle glow ── -->
  <line x1="256" y1="320" x2="370" y2="254"
    stroke="#f97316" stroke-width="14" stroke-linecap="round"
    opacity="0.35" filter="url(#needleGlow)"/>

  <!-- ── Needle ── -->
  <line x1="256" y1="320" x2="370" y2="254"
    stroke="url(#needleGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- ── Center hub ring glow ── -->
  <circle cx="256" cy="320" r="26" fill="#3b82f6" opacity="0.25" filter="url(#hubGlow)"/>

  <!-- ── Center hub ── -->
  <circle cx="256" cy="320" r="20" fill="#0f1e3d" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="256" cy="320" r="9"  fill="url(#hubGrad)"/>

  <!-- ── Small "km/h" speed label area ── -->
  <!-- Three horizontal bars suggesting speed/fuel lines -->
  <rect x="220" y="355" width="72" height="5" rx="2.5" fill="#1e3a6e" opacity="0.7"/>
  <rect x="230" y="367" width="52" height="4" rx="2" fill="#1e3a6e" opacity="0.5"/>
</svg>
